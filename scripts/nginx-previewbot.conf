# PreviewBot Management Endpoint — Nginx Reverse Proxy
#
# SSL Strategy:
# Option A (Recommended — Cloudflare): Point DNS to Cloudflare, enable "Full (Strict)" SSL.
#   Cloudflare handles wildcard TLS for *.preview.yourdomain.com automatically.
#   This config uses a Cloudflare Origin Certificate (generate from Cloudflare dashboard).
#   Place cert at /etc/ssl/cloudflare/cert.pem and key at /etc/ssl/cloudflare/key.pem
#
# Option B (Direct — Certbot): Use certbot with DNS challenge for wildcard cert:
#   certbot certonly --manual --preferred-challenges dns \
#     -d "*.preview.yourdomain.com" -d "previewbot.yourdomain.com"
#   Update ssl_certificate/ssl_certificate_key paths to /etc/letsencrypt/live/...
#
# Installation:
#   1. Replace PREVIEW_DOMAIN with your actual domain (or run install.sh which does this)
#   2. Copy to /etc/nginx/sites-available/previewbot
#   3. ln -s /etc/nginx/sites-available/previewbot /etc/nginx/sites-enabled/
#   4. nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name previewbot.PREVIEW_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name previewbot.PREVIEW_DOMAIN;

    # Update these paths based on your SSL strategy (see header)
    ssl_certificate /etc/ssl/cloudflare/cert.pem;
    ssl_certificate_key /etc/ssl/cloudflare/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        proxy_pass http://127.0.0.1:3500;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Webhook endpoint — allow larger payloads from GitHub
    location /webhook {
        proxy_pass http://127.0.0.1:3500;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10m;
    }

    # Health check — no access log noise
    location /health {
        proxy_pass http://127.0.0.1:3500;
        access_log off;
    }
}
